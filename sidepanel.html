<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobHunter AI — Analysis</title>
    <link rel="stylesheet" href="sidepanel.css">
</head>

<body>
    <div class="panel">
        <header class="panel-header">
            <div class="panel-logo">
                <div class="panel-logo-mark">
                    <svg viewBox="0 0 24 24" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                </div>
                <div>
                    <h1>JobHunter AI</h1>
                    <p class="panel-subtitle">Deep Job Analysis</p>
                </div>
            </div>
        </header>

        <div class="panel-status" id="panel-status">
            <div class="status-waiting">
                <div class="status-icon">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </div>
                <p>Click <strong>"Analyze"</strong> on any job listing to start analysis.</p>
                <p class="status-hint">Works on LinkedIn, Indeed, Greenhouse, Ashby, and Lever.</p>
            </div>
        </div>

        <div class="panel-content" id="panel-content" style="display:none;">
            <!-- Job Header -->
            <div class="job-header" id="job-header">
                <h2 class="job-title" id="job-title"></h2>
                <p class="job-company" id="job-company"></p>
                <p class="job-location" id="job-location"></p>
            </div>

            <!-- ATS Score Section -->
            <div class="score-section" id="score-section">
                <h3>
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"
                        stroke-linejoin="round" width="16" height="16" style="vertical-align: -2px;">
                        <line x1="18" y1="20" x2="18" y2="10" />
                        <line x1="12" y1="20" x2="12" y2="4" />
                        <line x1="6" y1="20" x2="6" y2="14" />
                    </svg>
                    ATS Score Analysis
                </h3>
                <div class="score-main">
                    <div class="score-circle">
                        <svg viewBox="0 0 120 120">
                            <circle cx="60" cy="60" r="54" class="score-bg" />
                            <circle cx="60" cy="60" r="54" class="score-fill" id="score-ring" />
                        </svg>
                        <div class="score-number" id="score-number">--</div>
                    </div>
                    <div class="score-breakdown" id="score-breakdown"></div>
                </div>
            </div>

            <!-- Keyword Analysis -->
            <div class="keywords-section" id="keywords-section">
                <h3>
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"
                        stroke-linejoin="round" width="16" height="16" style="vertical-align: -2px;">
                        <path
                            d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" />
                    </svg>
                    Keyword Analysis
                </h3>
                <div class="keyword-groups">
                    <div class="keyword-group">
                        <h4>Matching Keywords</h4>
                        <div class="keyword-list keyword-list-match" id="keywords-match"></div>
                    </div>
                    <div class="keyword-group">
                        <h4>Missing Keywords</h4>
                        <div class="keyword-list keyword-list-missing" id="keywords-missing"></div>
                    </div>
                </div>
            </div>

            <!-- Improvements -->
            <div class="improvements-section" id="improvements-section">
                <h3>
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"
                        stroke-linejoin="round" width="16" height="16" style="vertical-align: -2px;">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                    Top Improvements
                </h3>
                <div class="improvements-list" id="improvements-list"></div>
            </div>

            <!-- Tailored Resume -->
            <div class="tailored-section" id="tailored-section">
                <div class="tailored-header">
                    <h3>Tailored Resume</h3>
                    <div class="tailored-actions">
                        <button class="panel-btn" id="btn-copy-tailored">Copy</button>
                        <button class="panel-btn" id="btn-download-tailored">Download PDF</button>
                        <button class="panel-btn" id="btn-preview-tailored">Preview</button>
                    </div>
                </div>
                <div class="tailored-template-select">
                    <button class="tmpl-btn active" data-template="jakes">Classic</button>
                    <button class="tmpl-btn" data-template="faang">FAANG</button>
                    <button class="tmpl-btn" data-template="minimal">Minimal</button>
                </div>
                <div class="tailored-content" id="tailored-content"></div>
            </div>

            <!-- Cover Letter -->
            <div class="cover-section" id="cover-section">
                <div class="cover-header">
                    <h3>Cover Letter</h3>
                    <button class="panel-btn" id="btn-gen-cover">Generate</button>
                </div>
                <div class="cover-content" id="cover-content" style="display:none;"></div>
            </div>

            <!-- Actions -->
            <div class="panel-actions">
                <button class="panel-btn panel-btn-primary" id="btn-save-job">Save to Tracker</button>
                <button class="panel-btn panel-btn-accent" id="btn-mark-applied">Mark Applied</button>
            </div>
        </div>
    </div>

    <script src="lib/storage.js"></script>
    <script src="lib/gemini.js"></script>
    <script src="lib/ats-scorer.js"></script>
    <script src="lib/resume-templates.js"></script>
    <script src="sidepanel.js"></script>
</body>

</html>
